version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: chatrag-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatrag123}
      POSTGRES_DB: ${POSTGRES_DB:-chatrag}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatrag} -d ${POSTGRES_DB:-chatrag}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatrag-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: chatrag-frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
